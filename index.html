<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0f172a;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:8px;overflow-x:hidden}

/* Header */
#header{background:linear-gradient(135deg,#1e3a8a,#1e40af);border-radius:12px;padding:8px 12px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(30,58,138,.4);margin-bottom:8px}
#header img{height:44px;background:#fff;border-radius:8px;padding:3px 7px;object-fit:contain}
#header-title{flex:1;text-align:center}
#header-title .sub{color:rgba(255,255,255,.75);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
#header-title .main{color:#fbbf24;font-size:14px;font-weight:900}
#conn-box{display:flex;flex-direction:column;align-items:center;gap:4px}
#total-box{background:rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;text-align:center}
#total-box .n{color:#fbbf24;font-size:20px;font-weight:800;line-height:1}
#total-box .l{color:rgba(255,255,255,.7);font-size:9px}
#conn-pill{display:flex;align-items:center;gap:4px;border-radius:20px;padding:2px 7px}
#conn-dot{width:7px;height:7px;border-radius:50%}
#conn-label{font-size:9px;font-weight:700}

/* Stats */
#stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.stat-box{background:#1e293b;border-radius:8px;padding:7px 4px;text-align:center}
.stat-n{font-size:20px;font-weight:800}
.stat-l{font-size:8px;color:#94a3b8;margin-top:1px}

/* Admin banner */
#admin-banner{display:none;background:linear-gradient(90deg,#d97706,#b45309);border-radius:10px;
  padding:9px 13px;margin-bottom:8px;align-items:center;justify-content:space-between}
#admin-banner span{color:#fff;font-size:11px;font-weight:600}
#admin-banner button{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:6px;
  padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700}

/* Map */
#map-container{position:relative;width:100%;padding-bottom:180%;border-radius:10px;
  overflow:hidden;margin-bottom:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#map{position:absolute;inset:0;background:#f0ede6}
.map-label{position:absolute;display:flex;align-items:center;justify-content:center;
  border-radius:6px;font-size:11px;font-weight:800;letter-spacing:1px;text-align:center;line-height:1.5}
.mesa{position:absolute;border:none;border-radius:5px;color:#fff;font-size:9px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;
  touch-action:manipulation;transition:opacity .15s;outline:none;transform:translate(-50%,-50%)}
.mesa:active{opacity:.7}

/* Legend */
#legend{display:flex;gap:4px;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:4px;background:#1e293b;border-radius:6px;padding:5px 5px;flex:1}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-txt{font-size:8px;color:#94a3b8;line-height:1.3}

/* Footer buttons */
#footer-btns{display:flex;gap:8px}
.btn-primary{flex:1;padding:11px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;
  align-items:center;justify-content:center;padding:8px}
#overlay.show{display:flex}
.card{background:#fff;border-radius:16px;padding:18px;width:100%;max-width:min(340px,96vw);
  box-shadow:0 20px 60px rgba(0,0,0,.35)}
.card h2{font-size:22px;font-weight:800;color:#111;margin-bottom:3px}
.card .sub{font-size:13px;color:#6b7280;margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:11px 12px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:15px;outline:none;color:#111;background:#fafafa;font-family:Arial}
.field input:focus{border-color:#6366f1}
.field input.err{border-color:#ef4444}
.card-btns{display:flex;gap:8px;margin-top:4px}
.btn-confirm{flex:1;padding:12px 8px;border:none;border-radius:10px;color:#fff;
  font-size:14px;font-weight:700;cursor:pointer}
.btn-confirm:disabled{background:#d1d5db;cursor:default}
.btn-cancel{flex:1;padding:12px 8px;border:none;border-radius:10px;background:#f3f4f6;
  color:#374151;font-size:14px;font-weight:600;cursor:pointer}
.info-box{background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:14px}
.info-box .info-label{font-size:11px;color:#9ca3af;margin-bottom:3px}
.info-box .info-name{font-weight:700;font-size:16px;color:#111}
.info-box .info-phone{font-size:13px;color:#6b7280;margin-top:3px}
.warn-box{border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px}

/* List panel */
#list-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:999;align-items:flex-end;justify-content:center}
#list-panel.show{display:flex}
#list-inner{background:#fff;border-radius:20px 20px 0 0;padding:16px;width:100%;
  max-width:100%;max-height:85vh;display:flex;flex-direction:column}
#list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-shrink:0}
#list-header h3{font-weight:800;font-size:17px;color:#111}
#list-header .list-sub{font-size:12px;color:#9ca3af}
#list-header button{background:#f3f4f6;border:none;border-radius:50%;width:34px;height:34px;
  cursor:pointer;font-size:18px;color:#374151}
#list-body{overflow-y:auto;flex:1}
.list-row{display:flex;align-items:center;gap:12px;padding:11px;margin-bottom:8px;
  background:#f9fafb;border-radius:10px}
.list-num{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.list-info .list-name{font-weight:700;font-size:14px;color:#111}
.list-info .list-phone{font-size:12px;color:#6b7280}
.list-info .list-status{font-size:11px;font-weight:700;margin-top:2px}

/* PWA banner */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;padding:12px 16px;
  align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 -4px 20px rgba(0,0,0,.4)}
#install-banner.show{display:flex}
</style>
</head>

var state = {};

function loadLocal() {
  try { var s=localStorage.getItem(SK); return s?JSON.parse(s):null; } catch(e) { return null; }
}
function saveLocal(d) {
  try { localStorage.setItem(SK,JSON.stringify(d)); } catch(e) {}
}
function buildInitial() {
  var o={};
  TABLES.forEach(function(t){ o[t.id]={status:'available',name:'',phone:''}; });
  return o;
}

// ════════════════════════════════════════════
//  FIREBASE REST
// ════════════════════════════════════════════

// ════════════════════════════════════════════
//  FIREBASE REST
// ════════════════════════════════════════════
var sseSource = null;

function fbGet(path) {
  return fetch(FB+path+'.json').then(function(r){ return r.json(); });
}
function fbPatch(path, data) {
  return fetch(FB+path+'.json', {method:'PATCH', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}});
}
function fbSet(path, data) {
  return fetch(FB+path+'.json', {method:'PUT', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}});
}
function startSSE() {
  if(sseSource) { try { sseSource.close(); } catch(e) {} }
  try {
    sseSource = new EventSource(FB+'/mesas.json');
    sseSource.addEventListener('put', function(e) {
      try {
        var d = JSON.parse(e.data);
        if(d && d.data && typeof d.data==='object') {
          state = d.data; saveLocal(state); renderAll(); updateResCount();
        }
      } catch(err) {}
    });
    sseSource.addEventListener('patch', function(e) {
      try {
        var d = JSON.parse(e.data);
        if(d && d.data) {
          Object.keys(d.data).forEach(function(k){ state[k] = d.data[k]; });
          saveLocal(state); renderAll(); updateResCount();
        }
      } catch(err) {}
    });
    sseSource.onopen  = function() { setConnected(true); };
    sseSource.onerror = function() { setConnected(false); };
  } catch(e) { setConnected(false); }
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init() {
  // Render immediately from localStorage
  state = loadLocal() || buildInitial();
  buildMap();
  renderAll();

  // Sync Firebase in background
  fbGet('/mesas').then(function(data) {
    if(data && typeof data==='object' && Object.keys(data).length > 0) {
      state = data; saveLocal(state); renderAll(); updateResCount(); setConnected(true);
    } else {
      fbSet('/mesas', state).catch(function(){});
      setConnected(true);
    }
    startSSE();
  }).catch(function() { setConnected(false); startSSE(); });
}

// ════════════════════════════════════════════
//  BUILD MAP (once)
// ════════════════════════════════════════════

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function renderAll() {
  var avail=0,res=0,fin=0;
  TABLES.forEach(function(t) {
    var info=state[t.id]||{status:'available'};
    var btn=document.getElementById('mesa-'+t.id);
    if(!btn) return;
    var c=COLOR[info.status]||COLOR.available;
    btn.style.background=c;
    btn.style.boxShadow='0 2px 6px '+c+'88';
    btn.title='Mesa '+t.id+' — '+LABEL[info.status]+(info.name?' ('+info.name+')':'');
    if(info.status==='available') avail++;
    else if(info.status==='reserved') res++;
    else fin++;
  });
  document.getElementById('stat-avail').textContent=avail;
  document.getElementById('stat-res').textContent=res;
  document.getElementById('stat-fin').textContent=fin;
  document.getElementById('total-n').textContent=TABLES.length;
}

  var dot=document.getElementById('conn-dot');

// ════════════════════════════════════════════
function onTableClick(id) {
  var info=state[id]||{status:'available'};
  if(adminMode) {
    if(info.status!=='available') showAdminModal(id,info);
  } else {
    if(info.status==='available') showReserveModal(id);
    else showInfoModal(id,info);
  }
}

function openOverlay() { document.getElementById('overlay').classList.add('show'); }
function closeOverlay(e) { if(!e||e.target===document.getElementById('overlay')) { document.getElementById('overlay').classList.remove('show'); } }

function showReserveModal(id) {
  var card=document.getElementById('modal-card');
  card.innerHTML=`

    <div class="field"><label>Nome do Diretor *</label><input id="f-name" placeholder="Nome do diretor" autocomplete="off"/></div>

  document.getElementById('f-phone').onkeydown=function(e){if(e.key==='Enter')confirmReserve(id);};
}

function confirmReserve(id) {
  var name=document.getElementById('f-name').value.trim();
  var phone=document.getElementById('f-phone').value.trim();
  if(!name||!phone){document.getElementById('f-err').style.display='block';return;}
  state[id]={status:'reserved',name:name,phone:phone};
  saveLocal(state); renderAll(); closeOverlay();
  var _p={}; _p[id]={status:'reserved',name:name,phone:phone};
  fbPatch('/mesas',_p).catch(function(){});
  fbPatch('/mesas',(_defineProperty({},[id],{status:'reserved',name:name,phone:phone}))).catch(function(){});
  // Simple patch helper

}

function showInfoModal(id,info) {
  var c=COLOR[info.status];
  var card=document.getElementById('modal-card');
  card.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:48px;height:48px;border-radius:10px;background:${c};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px">${id}</div>

  openOverlay();
}

function showAdminModal(id,info) {
  var c=COLOR[info.status];
  var isRes=info.status==='reserved';
  var card=document.getElementById('modal-card');
  card.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:48px;height:48px;border-radius:10px;background:${c};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px">${id}</div>
      <div><div style="font-weight:800;font-size:16px;color:#111">Mesa ${id}</div><div style="font-size:12px;color:${c};font-weight:700">${LABEL[info.status]}</div></div>
    </div>
    ${info.name?`<div class="info-box" style="border-left:4px solid ${c}"><div class="info-label">🎩 DIRETOR</div><div class="info-name">${info.name}</div>${info.phone?`<div class="info-phone">👤 ${info.phone}</div>`:''  }</div>`:''}
    ${isRes?`<div class="warn-box" style="background:#fef2f2;color:#dc2626">🟢 <b>Liberar</b> retorna para disponível (verde).<br>🔴 <b>Finalizar</b> marca como concluída (vermelho).</div>`:`<div class="warn-box" style="background:#fffbeb;color:#d97706">↩ <b>Liberar</b> retorna esta mesa para disponível.</div>`}
    <div class="card-btns">
      <button class="btn-cancel" onclick="closeOverlay()">Cancelar</button>
      <button class="btn-confirm" style="background:#22c55e" onclick="adminRelease(${id})">🟢 Liberar</button>
      ${isRes?`<button class="btn-confirm" style="background:#ef4444" onclick="adminFinalize(${id})">🔴 Finalizar</button>`:''}
    </div>`;
  openOverlay();
}

function adminFinalize(id) {
  var prev=state[id]||{};
  state[id]=Object.assign({},prev,{status:'finalized'});
  saveLocal(state); renderAll(); closeOverlay();
  var _p={}; _p[id]=state[id];
  fbPatch('/mesas',_p).catch(function(){});

}
function adminRelease(id) {
  state[id]={status:'available',name:'',phone:''};
  saveLocal(state); renderAll(); closeOverlay();
  var _p={}; _p[id]=state[id];
  fbPatch('/mesas',_p).catch(function(){});

}

    </div>`;

  setTimeout(function(){document.getElementById('pw-input').focus();},100);

}
function checkAdminPass() {

function openList() {

  body.innerHTML=rows.length===0?'<div style="text-align:center;color:#9ca3af;padding:30px">Nenhuma reserva ainda</div>':
    rows.map(function(t){
      var info=state[t.id]; var c=COLOR[info.status];

    }).join('');
  document.getElementById('list-panel').classList.add('show');
}
function closeList(e) {
  if(!e||e.target===document.getElementById('list-panel')) document.getElementById('list-panel').classList.remove('show');
}

  w.document.write('<div class="noprint"><button onclick="window.print()" style="margin-right:12px;padding:10px 24px;background:#1e3a8a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Arial">🖨️ Imprimir</button><button onclick="window.close()" style="padding:10px 24px;background:#e5e7eb;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Arial">✕ Fechar</button></div>');
  w.document.write('</body></html>');
  w.document.close(); w.focus();
  setTimeout(function(){w.print();},400);
}

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
function installPWA(){
  document.getElementById('install-banner').classList.remove('show');
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
}
function closePWA(){document.getElementById('install-banner').classList.remove('show');}
if(window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone){
  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('install-banner').classList.remove('show');
  });
}
